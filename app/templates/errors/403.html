{% extends "base.html" %}

{% block title %}Access Denied - Trekk Management{% endblock %}

{% block content %}
<div class="error-page">
    <div class="error-code">403</div>
    <h2>Access Denied</h2>
    <p>You do not have permission to access this page.</p>
    {% if current_user.is_authenticated %}
        <a href="/" class="btn btn-primary" style="width: auto;">Go to My Dashboard</a>
    {% else %}
        <a href="{{ url_for('auth.login') }}" class="btn btn-primary" style="width: auto;">Go to Login</a>
    {% endif %}
</div>
{% endblock %}
