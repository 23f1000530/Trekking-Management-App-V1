{% extends "base.html" %}

{% block title %}Page Not Found - Trekk Management{% endblock %}

{% block content %}
<div class="error-page">
    <div class="error-code">404</div>
    <h2>Page Not Found</h2>
    <p>The page you are looking for does not exist.</p>
    {% if current_user.is_authenticated %}
        <a href="/" class="btn btn-primary" style="width: auto;">Go to My Dashboard</a>
    {% else %}
        <a href="{{ url_for('auth.login') }}" class="btn btn-primary" style="width: auto;">Go to Login</a>
    {% endif %}
</div>
{% endblock %}
