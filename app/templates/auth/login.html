{% extends "base.html" %}

{% block title %}Login - Trekk Management{% endblock %}

{% block content %}
<div class="auth-container">
    <div class="auth-card">
        <h1>Welcome Back</h1>
        <p class="subtitle">Sign in to your account to continue</p>

        <form method="POST" action="{{ url_for('auth.login') }}">
            <div class="form-group">
                <label for="username">Username</label>
                <input type="text" id="username" name="username" class="form-control"
                       placeholder="Enter your username" required autofocus>
            </div>

            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" class="form-control"
                       placeholder="Enter your password" required>
            </div>

            <button type="submit" class="btn btn-primary">Sign In</button>
        </form>

        <div class="auth-divider">
            <span>New here?</span>
        </div>

        <div style="display: flex; gap: 12px;">
            <a href="{{ url_for('auth.register_trekker') }}" class="btn btn-secondary" style="flex: 1;">
                Register as Trekker
            </a>
            <a href="{{ url_for('auth.register_staff') }}" class="btn btn-secondary" style="flex: 1;">
                Register as Staff
            </a>
        </div>

        <div class="auth-links">
            <p style="margin-top: 1rem; font-size: 0.8rem; color: var(--text-muted);">
                Admin accounts are predefined. Contact system administrator for access.
            </p>
        </div>
    </div>
</div>
{% endblock %}
