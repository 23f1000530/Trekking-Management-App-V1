{% extends "base.html" %}

{% block title %}Register as Trekker - Trekk Management{% endblock %}

{% block content %}
<div class="auth-container">
    <div class="auth-card">
        <h1>Create Your Account</h1>
        <p class="subtitle">Register as a trekker and start booking amazing treks</p>

        <form method="POST" action="{{ url_for('auth.register_trekker') }}">
            <div class="form-group">
                <label for="username">Username</label>
                <input type="text" id="username" name="username" class="form-control"
                       placeholder="Choose a username (min 3 characters)" required minlength="3"
                       value="{{ request.form.get('username', '') }}">
            </div>

            <div class="form-group">
                <label for="email">Email Address</label>
                <input type="email" id="email" name="email" class="form-control"
                       placeholder="Enter your email address" required
                       value="{{ request.form.get('email', '') }}">
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" name="password" class="form-control"
                           placeholder="Min 6 characters" required minlength="6">
                </div>

                <div class="form-group">
                    <label for="confirm_password">Confirm Password</label>
                    <input type="password" id="confirm_password" name="confirm_password" class="form-control"
                           placeholder="Re-enter password" required minlength="6">
                </div>
            </div>

            <button type="submit" class="btn btn-primary">Create Account</button>
        </form>

        <div class="auth-links">
            <p>Already have an account? <a href="{{ url_for('auth.login') }}">Sign in</a></p>
            <p style="margin-top: 0.5rem;">Want to join as staff? <a href="{{ url_for('auth.register_staff') }}">Register as Trek Staff</a></p>
        </div>
    </div>
</div>
{% endblock %}
