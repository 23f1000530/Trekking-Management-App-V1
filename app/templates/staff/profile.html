{% extends "base.html" %}

{% block title %}My Profile - Trekk Management{% endblock %}

{% block content %}
<div class="dashboard-header">
    <h1>&#128100; My Profile</h1>
    <p>Update your profile information</p>
</div>

<div class="form-card">
    <form method="POST" action="{{ url_for('staff_bp.profile') }}">
        <div class="form-grid">
            <div class="form-group">
                <label for="username">Username</label>
                <input type="text" id="username" class="form-control" value="{{ current_user.username }}" disabled>
                <small class="form-hint">Username cannot be changed</small>
            </div>

            <div class="form-group">
                <label for="email">Email</label>
                <input type="email" id="email" name="email" class="form-control" value="{{ current_user.email }}">
            </div>

            <div class="form-group">
                <label for="full_name">Full Name *</label>
                <input type="text" id="full_name" name="full_name" class="form-control" value="{{ profile.full_name if profile else '' }}" required>
            </div>

            <div class="form-group">
                <label for="phone">Phone</label>
                <input type="text" id="phone" name="phone" class="form-control" placeholder="e.g., +91 9876543210" value="{{ profile.phone if profile and profile.phone else '' }}">
            </div>

            <div class="form-group">
                <label for="experience_years">Experience (Years)</label>
                <input type="number" id="experience_years" name="experience_years" class="form-control" min="0" value="{{ profile.experience_years if profile else 0 }}">
            </div>

            <div class="form-group">
                <label for="specialization">Specialization</label>
                <input type="text" id="specialization" name="specialization" class="form-control" placeholder="e.g., High altitude treks" value="{{ profile.specialization if profile and profile.specialization else '' }}">
            </div>

            <div class="form-group full-width">
                <label for="bio">Bio</label>
                <textarea id="bio" name="bio" class="form-control" placeholder="Tell us about yourself...">{{ profile.bio if profile and profile.bio else '' }}</textarea>
            </div>

            <div class="form-group full-width">
                <div class="form-divider">
                    <span>Change Password (leave blank to keep current)</span>
                </div>
            </div>

            <div class="form-group full-width">
                <label for="new_password">New Password</label>
                <input type="password" id="new_password" name="new_password" class="form-control" placeholder="Minimum 6 characters">
            </div>
        </div>

        <div class="form-actions">
            <button type="submit" class="btn btn-primary btn-action">&#10003; Update Profile</button>
            <a href="{{ url_for('staff_bp.dashboard') }}" class="btn btn-secondary btn-action">Cancel</a>
        </div>
    </form>
</div>
{% endblock %}
