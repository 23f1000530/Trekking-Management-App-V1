{% extends "base.html" %}

{% block title %}My Profile - Trekk Management{% endblock %}

{% block content %}
<div class="dashboard-header">
    <h1>&#128100; My Profile</h1>
    <p>Update your account information</p>
</div>

<div class="form-card">
    <form method="POST" action="{{ url_for('trekker_bp.profile') }}">
        <div class="form-grid">
            <div class="form-group">
                <label for="username">Username</label>
                <input type="text" id="username" class="form-control" value="{{ current_user.username }}" disabled>
                <small class="form-hint">Username cannot be changed</small>
            </div>

            <div class="form-group">
                <label for="email">Email</label>
                <input type="email" id="email" name="email" class="form-control" value="{{ current_user.email }}">
            </div>

            <div class="form-group">
                <label for="role">Role</label>
                <input type="text" id="role" class="form-control" value="Trekker" disabled>
            </div>

            <div class="form-group">
                <label for="joined">Joined</label>
                <input type="text" id="joined" class="form-control" value="{{ current_user.created_at.strftime('%d %b %Y') if current_user.created_at else 'N/A' }}" disabled>
            </div>

            <div class="form-group full-width">
                <div class="form-divider">
                    <span>Change Password (leave blank to keep current)</span>
                </div>
            </div>

            <div class="form-group full-width">
                <label for="new_password">New Password</label>
                <input type="password" id="new_password" name="new_password" class="form-control" placeholder="Minimum 6 characters">
            </div>
        </div>

        <div class="form-actions">
            <button type="submit" class="btn btn-primary btn-action">&#10003; Update Profile</button>
            <a href="{{ url_for('trekker_bp.dashboard') }}" class="btn btn-secondary btn-action">Cancel</a>
        </div>
    </form>
</div>
{% endblock %}
